name: chai_shots
description: "chai shots"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  flutter_otp_text_field: ^1.1.1
  http: ^1.1.0
  video_player: ^2.11.1
  shared_preferences: ^2.2.2
  url_launcher: ^6.3.1
  image_picker: ^1.0.7
  google_fonts: ^6.1.0
  provider: ^6.1.2
  share_plus: ^12.0.2
  visibility_detector: any
  font_awesome_flutter: ^10.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/images/
    - assets/videos/
    - assets/payment/phonepe.png
    - assets/payment/gpay.png
    - assets/payment/upi.png
    - assets/chai_logo.png
    - assets/chai_logo_new.jpg
    - assets/subscription_hero.png

